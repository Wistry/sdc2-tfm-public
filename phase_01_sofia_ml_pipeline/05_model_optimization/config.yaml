data:
  candidates_path: "../03_candidate_dataset/outputs/baseline_current_full/candidates_sofia_only.csv"
  label_column: "clean_label"
  positive_label: 1
  negative_label: 0
  ambiguous_label: -1

benchmark:
  full_feature_columns_path: "../04_eda_and_benchmark/outputs/benchmark/full/feature_columns_used.csv"
  no_position_feature_columns_path: "../04_eda_and_benchmark/outputs/benchmark/no_position/feature_columns_used.csv"
  full_rankings_path: "../04_eda_and_benchmark/outputs/benchmark/full/model_rankings.csv"
  no_position_rankings_path: "../04_eda_and_benchmark/outputs/benchmark/no_position/model_rankings.csv"

optimization:
  random_state: 42
  test_size: 0.2
  n_trials: 100
  timeout_minutes_per_model: 10
  cv_splits: 5
  scoring_main: "average_precision"
  selected_models:
    - RandomForest
    - ExtraTrees
    - XGBoost
    - GradientBoosting
    - HistGradientBoosting
  feature_sets:
    - full
    - no_position

thresholds:
  grid_min: 0.05
  grid_max: 0.95
  grid_step: 0.01
  conservative_min_recall: 0.70
  optimize_for:
    - f1
    - f0_5
    - f2
    - balanced_accuracy
    - conservative_fp

outputs:
  optuna_dir: "outputs/optuna"
  validation_dir: "outputs/validation"
  final_models_dir: "outputs/final_models"
  report_figures_dir: "outputs/report_figures"
  reports_dir: "reports"
